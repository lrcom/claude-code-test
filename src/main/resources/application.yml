server:
  port: 8080

spring:
  application:
    name: auth-service

  # -------------------------------------------------------------------------
  # JDK 21 虚拟线程（Project Loom）
  # -------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # -------------------------------------------------------------------------
  # 数据源：H2 文件模式（服务重启后数据不丢失）
  # 生产环境切换 MySQL：--spring.profiles.active=prod
  # -------------------------------------------------------------------------
  datasource:
    url: jdbc:h2:file:./data/authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # -------------------------------------------------------------------------
  # SQL 初始化：schema.sql 在每次启动时执行（IF NOT EXISTS 保证幂等）
  # -------------------------------------------------------------------------
  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  # -------------------------------------------------------------------------
  # Spring Cloud Alibaba - Nacos（默认关闭，启动 Nacos 后改为 true）
  # -------------------------------------------------------------------------
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        file-extension: yaml

# -------------------------------------------------------------------------
# MyBatis-Plus
# -------------------------------------------------------------------------
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# -------------------------------------------------------------------------
# JWT 配置
# secret 长度 >= 32 字符（HS256 要求 256 bit）
# -------------------------------------------------------------------------
jwt:
  secret: "auth-service-jwt-secret-key-minimum-32chars!"
  expiration: 86400000    # 24小时（毫秒）

# -------------------------------------------------------------------------
# 日志
# -------------------------------------------------------------------------
logging:
  level:
    com.example.auth: DEBUG
    org.springframework.security: INFO

---
# MySQL 生产环境 Profile（使用 --spring.profiles.active=prod 激活）
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  sql:
    init:
      mode: never    # 生产环境由 DBA 管理 DDL
  cloud:
    nacos:
      discovery:
        enabled: true
      config:
        enabled: true
