<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #1677ff;
    }

    .error-msg {
      font-size: 12px;
      color: #ff4d4f;
      margin-top: 4px;
      display: none;
    }

    .form-group.has-error input { border-color: #ff4d4f; }
    .form-group.has-error .error-msg { display: block; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover { background: #0958d9; }
    .btn-login:disabled { background: #a0c4ff; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.success { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .alert.error   { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; }
    .alert.show    { display: block; }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }

    .register-link a { color: #1677ff; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>账号注册</h1>

    <div id="alert" class="alert"></div>

    <form id="registerForm" novalidate>
      <div class="form-group" id="usernameGroup">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名（3-32字符）" autocomplete="username" />
        <span class="error-msg" id="usernameError"></span>
      </div>

      <div class="form-group" id="emailGroup">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email" />
        <span class="error-msg" id="emailError"></span>
      </div>

      <div class="form-group" id="passwordGroup">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码（6-64字符）" autocomplete="new-password" />
        <span class="error-msg" id="passwordError"></span>
      </div>

      <div class="form-group" id="confirmGroup">
        <label for="confirm">确认密码</label>
        <input type="password" id="confirm" placeholder="请再次输入密码" autocomplete="new-password" />
        <span class="error-msg" id="confirmError"></span>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">注册</button>
    </form>

    <p class="register-link">已有账号？<a href="login.html">立即登录</a></p>
  </div>

  <script>
    const API_REGISTER = '/api/auth/register';

    const usernameInput = document.getElementById('username');
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirm');

    const usernameGroup = document.getElementById('usernameGroup');
    const emailGroup    = document.getElementById('emailGroup');
    const passwordGroup = document.getElementById('passwordGroup');
    const confirmGroup  = document.getElementById('confirmGroup');

    const usernameError = document.getElementById('usernameError');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmError  = document.getElementById('confirmError');

    const alertEl   = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert ${type} show`;
    }

    function clearAlert() {
      alertEl.className = 'alert';
    }

    function setFieldError(group, errorEl, msg) {
      group.classList.add('has-error');
      errorEl.textContent = msg;
    }

    function clearFieldError(group) {
      group.classList.remove('has-error');
    }

    function validate() {
      let ok = true;
      clearFieldError(usernameGroup);
      clearFieldError(emailGroup);
      clearFieldError(passwordGroup);
      clearFieldError(confirmGroup);

      const username = usernameInput.value.trim();
      const email    = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm  = confirmInput.value;

      if (!username) {
        setFieldError(usernameGroup, usernameError, '请输入用户名');
        ok = false;
      } else if (username.length < 3 || username.length > 32) {
        setFieldError(usernameGroup, usernameError, '用户名长度须在 3-32 字符之间');
        ok = false;
      }

      if (!email) {
        setFieldError(emailGroup, emailError, '请输入邮箱');
        ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailGroup, emailError, '邮箱格式不正确');
        ok = false;
      }

      if (!password) {
        setFieldError(passwordGroup, passwordError, '请输入密码');
        ok = false;
      } else if (password.length < 6 || password.length > 64) {
        setFieldError(passwordGroup, passwordError, '密码长度须在 6-64 字符之间');
        ok = false;
      }

      if (!confirm) {
        setFieldError(confirmGroup, confirmError, '请再次输入密码');
        ok = false;
      } else if (confirm !== password) {
        setFieldError(confirmGroup, confirmError, '两次密码输入不一致');
        ok = false;
      }

      return ok;
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      if (!validate()) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '注册中...';

      try {
        const res = await fetch(API_REGISTER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await res.json();

        if (res.status === 201 || (res.ok && data.code === 200)) {
          showAlert('注册成功，即将跳转到登录页...', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1000);
        } else {
          showAlert(data.message || '注册失败，请稍后重试', 'error');
        }
      } catch (err) {
        showAlert('网络异常，请稍后重试', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '注册';
      }
    });
  </script>
</body>
</html>
