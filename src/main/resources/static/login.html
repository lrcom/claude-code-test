<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #1677ff;
    }

    .error-msg {
      font-size: 12px;
      color: #ff4d4f;
      margin-top: 4px;
      display: none;
    }

    .form-group.has-error input { border-color: #ff4d4f; }
    .form-group.has-error .error-msg { display: block; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover { background: #0958d9; }
    .btn-login:disabled { background: #a0c4ff; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.success { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .alert.error   { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; }
    .alert.show    { display: block; }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }

    .register-link a { color: #1677ff; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>账号登录</h1>

    <div id="alert" class="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group" id="emailGroup">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email" />
        <span class="error-msg" id="emailError"></span>
      </div>

      <div class="form-group" id="passwordGroup">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
        <span class="error-msg" id="passwordError"></span>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">登录</button>
    </form>

    <p class="register-link">还没有账号？<a href="register.html">立即注册</a></p>
  </div>

  <script>
    const API_LOGIN = '/api/auth/login';

    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailGroup    = document.getElementById('emailGroup');
    const passwordGroup = document.getElementById('passwordGroup');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const alert         = document.getElementById('alert');
    const submitBtn     = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alert.textContent = msg;
      alert.className = `alert ${type} show`;
    }

    function clearAlert() {
      alert.className = 'alert';
    }

    function setFieldError(group, errorEl, msg) {
      group.classList.add('has-error');
      errorEl.textContent = msg;
    }

    function clearFieldError(group) {
      group.classList.remove('has-error');
    }

    function validate() {
      let ok = true;
      clearFieldError(emailGroup);
      clearFieldError(passwordGroup);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        setFieldError(emailGroup, emailError, '请输入邮箱');
        ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailGroup, emailError, '邮箱格式不正确');
        ok = false;
      }

      if (!password) {
        setFieldError(passwordGroup, passwordError, '请输入密码');
        ok = false;
      }

      return ok;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      if (!validate()) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';

      try {
        const res = await fetch(API_LOGIN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await res.json();

        if (res.ok && data.code === 200) {
          localStorage.setItem('token', data.data.token);
          showAlert('登录成功，跳转中...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          showAlert(data.message || '登录失败，请检查邮箱或密码', 'error');
        }
      } catch (err) {
        showAlert('网络异常，请稍后重试', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
